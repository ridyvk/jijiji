name: Deploy sora

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Rebuild static preview
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/assets
          build_file() {
            local output="$1"
            shift
            cat "$@" | base64 -d > "$output"
          }
          build_file _site/index.html .sora_payload/index.html.b64.*
          build_file _site/manifest.webmanifest .sora_payload/manifest.webmanifest.b64.*
          build_file _site/service-worker.js .sora_payload/service-worker.js.b64.*
          build_file _site/assets/index-CZkFYgQA.js .sora_payload/assets/index-CZkFYgQA.js.b64.*
          build_file _site/assets/index-CyV1RFfF.css .sora_payload/assets/index-CyV1RFfF.css.b64.*
          build_file _site/assets/icon-512.png .sora_payload/assets/icon-512.png.b64.*
          cp assets/icon-192.png _site/assets/icon-192.png
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
