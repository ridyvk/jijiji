    <title>sora</title>
    <style>
      :root {
        color-scheme: light;
        --bg0: #f8fdff;
        --bg1: #dcfbff;
        --bg2: #fff7dc;
        --ink: #102033;
        --muted: #5e7184;
        --panel: rgba(255, 255, 255, 0.72);
        --panel-strong: rgba(255, 255, 255, 0.9);
        --line: rgba(40, 120, 150, 0.16);
        --accent: #24c8e8;
        --accent2: #7cdcff;
        --glow: rgba(62, 218, 240, 0.46);
        --shadow: rgba(39, 92, 119, 0.16);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 12%, var(--glow), transparent 31rem),
          radial-gradient(circle at 84% 5%, rgba(255,255,255,.9), transparent 23rem),
          linear-gradient(145deg, var(--bg0), var(--bg1) 50%, var(--bg2));
        overflow-x: hidden;
        transition: background .7s ease, color .4s ease;
      }
      body[data-weather="rain"] { --bg0:#071c34; --bg1:#123d62; --bg2:#597d9f; --ink:#f5fbff; --muted:#c3d7e5; --panel:rgba(11,31,54,.62); --panel-strong:rgba(17,49,80,.82); --line:rgba(190,230,255,.18); --accent:#6fe6ff; --accent2:#9bd7ff; --glow:rgba(76,177,235,.34); --shadow:rgba(0,0,0,.28); color-scheme: dark; }
      body[data-weather="cloud"] { --bg0:#f7fafc; --bg1:#dce4eb; --bg2:#b9c7d1; --ink:#182433; --muted:#667584; --panel:rgba(255,255,255,.66); --panel-strong:rgba(255,255,255,.86); --line:rgba(80,96,112,.17); --accent:#6ecfe5; --accent2:#a8d8e6; --glow:rgba(194,211,222,.46); }
      body[data-weather="snow"] { --bg0:#ffffff; --bg1:#e6fbff; --bg2:#eef5ff; --ink:#17304a; --muted:#61798e; --accent:#67d9f4; --accent2:#c7f5ff; --glow:rgba(200,247,255,.68); }
      body[data-weather="fog"] { --bg0:#fbfcfd; --bg1:#e5ebee; --bg2:#ccd6db; --ink:#1f2b35; --muted:#6d7880; --accent:#7fd7e7; --accent2:#d8eef2; --glow:rgba(214,226,230,.68); }
      body[data-weather="storm"] { --bg0:#111927; --bg1:#26384a; --bg2:#55728a; --ink:#f7fbff; --muted:#cad7e1; --panel:rgba(18,28,43,.64); --panel-strong:rgba(28,43,62,.84); --line:rgba(220,240,255,.16); --accent:#72e8ff; --accent2:#b8f2ff; --glow:rgba(105,190,232,.3); --shadow:rgba(0,0,0,.34); color-scheme: dark; }
      body[data-weather="night"] { --bg0:#071524; --bg1:#102c45; --bg2:#1f536d; --ink:#f3fbff; --muted:#bdd2df; --panel:rgba(8,24,39,.66); --panel-strong:rgba(17,44,64,.84); --line:rgba(185,230,255,.16); --accent:#62ddff; --accent2:#b4efff; --glow:rgba(74,174,235,.34); --shadow:rgba(0,0,0,.32); color-scheme: dark; }
      .app { position: relative; width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 40px; }
      .sky-art { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: -1; }
      .orb { position:absolute; width: 42vmin; aspect-ratio:1; border-radius:50%; left: 56%; top: 8%; background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.95), var(--accent2) 36%, transparent 68%); filter: blur(1px); opacity:.68; animation: breathe 8s ease-in-out infinite; }
      .veil { position:absolute; inset: 10% -10% auto; height: 42vh; background: linear-gradient(105deg, transparent, rgba(255,255,255,.34), transparent); transform: rotate(-6deg); animation: drift 14s linear infinite; }
      .rays { position:absolute; inset:0; background: repeating-linear-gradient(105deg, transparent 0 42px, rgba(255,255,255,.12) 43px 45px, transparent 46px 120px); mix-blend-mode: soft-light; opacity:.6; animation: slide 18s linear infinite; }
      body[data-weather="rain"] .rays { background: repeating-linear-gradient(100deg, transparent 0 28px, rgba(150,220,255,.22) 29px 31px, transparent 32px 72px); opacity:.72; }
      @keyframes breathe { 50% { transform: translate3d(-18px, 12px, 0) scale(1.08); opacity: .86; } }
      @keyframes drift { to { transform: translateX(14%) rotate(-6deg); } }
      @keyframes slide { to { background-position: 380px 0; } }
      header { display:flex; align-items:center; gap:16px; justify-content:space-between; padding:10px 0 22px; }
      .brand { display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit; min-width: 0; }
      .brand img { width:44px; height:44px; border-radius:14px; box-shadow:0 12px 30px var(--shadow); }
      .brand strong { display:block; font-size:1.25rem; letter-spacing:0; }
      .brand span { display:block; color:var(--muted); font-size:.78rem; margin-top:1px; }
      .search { flex:1; max-width:620px; display:grid; grid-template-columns: 1fr auto auto auto; gap:8px; align-items:center; }
      input, button { font: inherit; }
      input { width:100%; min-width:0; border:1px solid var(--line); color:var(--ink); background:var(--panel-strong); border-radius:8px; padding:13px 14px; outline:none; box-shadow:0 10px 30px var(--shadow); }
      input:focus { border-color: color-mix(in srgb, var(--accent) 65%, white); box-shadow:0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent), 0 14px 34px var(--shadow); }
      button { border:1px solid var(--line); color:var(--ink); background:var(--panel-strong); min-height:44px; padding:0 13px; border-radius:8px; cursor:pointer; box-shadow:0 10px 26px var(--shadow); transition:transform .18s ease, border-color .18s ease, background .18s ease; }
      button:hover { transform:translateY(-1px); border-color: color-mix(in srgb, var(--accent) 55%, var(--line)); }
      button.primary { background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#04202b; border-color:transparent; font-weight:700; }
      main { display:grid; grid-template-columns: minmax(0, 1.25fr) minmax(320px, .75fr); gap:16px; align-items:start; }
      .panel { border:1px solid var(--line); background:var(--panel); backdrop-filter: blur(22px) saturate(1.2); border-radius:8px; box-shadow:0 18px 70px var(--shadow); }
      .hero { min-height:520px; padding:26px; display:grid; grid-template-rows:auto 1fr auto; overflow:hidden; position:relative; }
      .hero:before { content:""; position:absolute; inset:14px; border-radius:8px; border:1px solid rgba(255,255,255,.28); pointer-events:none; }
      .hero-top { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; position:relative; z-index:1; }
      .location h1 { margin:0; font-size: clamp(2rem, 7vw, 5.8rem); line-height:.92; letter-spacing:0; max-width: 760px; overflow-wrap:anywhere; }
      .location p { margin:10px 0 0; color:var(--muted); font-weight:650; }
      .updated { text-align:right; color:var(--muted); font-size:.88rem; line-height:1.55; min-width:150px; }
      .temperature { position:relative; z-index:1; align-self:center; display:flex; align-items:flex-end; gap:18px; flex-wrap:wrap; }
      .temp { font-size: clamp(5.4rem, 18vw, 13.5rem); line-height:.78; font-weight:800; letter-spacing:0; }
      .cond { margin-bottom:16px; max-width:360px; }
      .cond strong { display:block; font-size: clamp(1.4rem, 3vw, 2.4rem); line-height:1.05; }
      .cond span { display:block; color:var(--muted); margin-top:8px; font-weight:650; }
      .metrics { position:relative; z-index:1; display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:10px; }
      .metric { background:rgba(255,255,255,.34); border:1px solid var(--line); border-radius:8px; padding:14px; min-height:86px; }
      .metric span { display:block; color:var(--muted); font-size:.78rem; font-weight:750; }
      .metric strong { display:block; margin-top:8px; font-size:1.25rem; }
      .side { display:grid; gap:16px; }
      .card { padding:18px; }
      .card h2 { margin:0 0 14px; font-size:1rem; letter-spacing:0; }
      .quick { display:flex; flex-wrap:wrap; gap:8px; }
      .quick button { min-height:38px; padding:0 11px; box-shadow:none; }
      .timeline { display:grid; grid-auto-flow:column; grid-auto-columns:minmax(78px, 1fr); overflow:auto; gap:8px; padding-bottom:4px; }
      .hour { background:rgba(255,255,255,.32); border:1px solid var(--line); border-radius:8px; padding:12px 10px; text-align:center; min-height:118px; }
      .hour b, .day b { display:block; font-size:.86rem; }
      .symbol { font-size:1.7rem; margin:9px 0; line-height:1; }
      .hour span, .day span { color:var(--muted); font-size:.82rem; }
      .days { display:grid; gap:8px; }
      .day { display:grid; grid-template-columns:70px 38px 1fr auto; align-items:center; gap:8px; background:rgba(255,255,255,.3); border:1px solid var(--line); border-radius:8px; padding:10px; min-height:58px; }
      .bar { height:8px; border-radius:999px; background:linear-gradient(90deg, var(--accent2), var(--accent)); overflow:hidden; }
      .nowcast { display:grid; gap:10px; }
      .rainline { display:grid; grid-template-columns:repeat(12, 1fr); gap:4px; align-items:end; height:76px; }
      .rainline i { display:block; min-height:4px; border-radius:4px 4px 0 0; background:linear-gradient(180deg, var(--accent2), var(--accent)); opacity:.38; }
      .status { color:var(--muted); font-size:.86rem; line-height:1.6; }
      .suggestions { display:none; position:absolute; right:0; left:0; top:calc(100% + 8px); background:var(--panel-strong); border:1px solid var(--line); border-radius:8px; box-shadow:0 16px 40px var(--shadow); overflow:hidden; z-index:5; }
      .search-wrap { position:relative; min-width:0; }
      .suggestions button { display:block; width:100%; text-align:left; box-shadow:none; border:0; border-bottom:1px solid var(--line); border-radius:0; background:transparent; }
      .suggestions button:last-child { border-bottom:0; }
      @media (max-width: 880px) {
        .app { width:min(100% - 20px, 720px); padding-top:14px; }
        header { align-items:stretch; flex-direction:column; gap:12px; }
        .search { max-width:none; grid-template-columns:1fr auto auto; }
        .search .primary { grid-column:1 / -1; }
        main { grid-template-columns:1fr; }
        .hero { min-height:500px; padding:18px; }
        .hero-top { flex-direction:column; }
        .updated { text-align:left; min-width:0; }
        .metrics { grid-template-columns:repeat(2, minmax(0, 1fr)); }
        .day { grid-template-columns:58px 34px 1fr auto; }
      }
      @media (max-width: 520px) {
        .search { grid-template-columns:1fr 44px 44px; }
        button { padding:0 10px; }
        .location h1 { font-size: clamp(2.1rem, 17vw, 4.2rem); }
        .temp { font-size: clamp(5rem, 31vw, 8.3rem); }
        .metrics { grid-template-columns:1fr; }
        .metric { min-height:72px; }
      }
    </style>
  </head>

        0:['快晴','clear','☀'], 1:['晴れ','clear','☀'], 2:['薄曇り','cloud','◐'], 3:['曇り','cloud','☁'], 45:['霧','fog','≋'], 48:['霧氷','fog','≋'],
        51:['弱い霧雨','rain','·'], 53:['霧雨','rain','·'], 55:['強い霧雨','rain','·'], 61:['小雨','rain','☂'], 63:['雨','rain','☂'], 65:['強い雨','rain','☂'],
        71:['小雪','snow','✦'], 73:['雪','snow','✦'], 75:['強い雪','snow','✦'], 80:['にわか雨','rain','☂'], 81:['にわか雨','rain','☂'], 82:['激しい雨','rain','☂'],
        95:['雷雨','storm','⚡'], 96:['雷雨','storm','⚡'], 99:['強い雷雨','storm','⚡']
      };
      const fmtTime = (v) => new Date(v).toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
      const fmtDay = (v) => new Date(v).toLocaleDateString('ja-JP', { weekday:'short', month:'numeric', day:'numeric' });
      const temp = (c) => state.unit === 'f' ? Math.round(c * 9 / 5 + 32) + '°' : Math.round(c) + '°';
      const kind = (code, isDay=1) => isDay ? (codes[code]?.[1] || 'cloud') : 'night';
      const label = (code) => codes[code]?.[0] || '変わりやすい空';
      const icon = (code) => codes[code]?.[2] || '○';
      function setWeatherTheme(code, isDay) {
        document.body.dataset.weather = kind(code, isDay);
        document.querySelector('meta[name="theme-color"]').setAttribute('content', getComputedStyle(document.body).getPropertyValue('--bg1').trim() || '#ecfeff');
      }
      function renderQuick() {
        $('quick').innerHTML = quickCities.map((c,i) => `<button type="button" data-i="${i}">${c[0]}</button>`).join('');
        $('quick').querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => { state.place = quickCities[+btn.dataset.i]; load(); }));
      }
      async function findCity(name) {
        const res = await fetch(`${geocode}?name=${encodeURIComponent(name)}&count=6&language=ja&format=json`);
        if (!res.ok) throw new Error('search failed');
        return (await res.json()).results || [];
      }
      async function load() {
        const [name, lat, lon, country] = state.place;
        $('place').textContent = name;
        $('subplace').textContent = country || '';
        $('condition').textContent = '読み込み中';
        const params = new URLSearchParams({ latitude: lat, longitude: lon, current: 'temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,rain,showers,snowfall,weather_code,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m', hourly: 'temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,cloud_cover,wind_speed_10m,uv_index,is_day', daily: 'weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max,sunrise,sunset', timezone: 'auto', forecast_days: 7 });
        const airParams = new URLSearchParams({ latitude: lat, longitude: lon, current: 'us_aqi,pm2_5', timezone: 'auto' });
        try {
          const [forecast, air] = await Promise.all([fetch(`${api}?${params}`).then(r => r.json()), fetch(`${airApi}?${airParams}`).then(r => r.ok ? r.json() : null).catch(() => null)]);
          state.data = forecast;
          render(forecast, air);
          state.next = Date.now() + 5 * 60 * 1000;
          tick();
          clearInterval(state.timer);
          state.timer = setInterval(() => Date.now() >= state.next ? load() : tick(), 1000);
        } catch (err) {
          render(demo(), null);
          $('status').textContent = '通信できないためデモ表示';
        }
      }
      function render(data, air) {
        const c = data.current;
        setWeatherTheme(c.weather_code, c.is_day);
        $('temp').textContent = temp(c.temperature_2m);
        $('condition').textContent = label(c.weather_code);
        $('feel').textContent = `体感 ${temp(c.apparent_temperature)} / 雲量 ${Math.round(c.cloud_cover)}%`;
        $('humidity').textContent = Math.round(c.relative_humidity_2m) + '%';
        $('wind').textContent = Math.round(c.wind_speed_10m) + ' km/h';
        $('precip').textContent = ((c.precipitation || c.rain || c.showers || c.snowfall || 0).toFixed(1)) + ' mm';
        $('pressure').textContent = Math.round(c.pressure_msl) + ' hPa';
        $('uv').textContent = Math.round(data.daily.uv_index_max[0] || data.hourly.uv_index[0] || 0);
        $('aqi').textContent = air?.current?.us_aqi ? Math.round(air.current.us_aqi) : '--';
        $('updated').textContent = fmtTime(Date.now()) + ' 更新';
        $('hours').innerHTML = data.hourly.time.slice(0, 24).map((t, i) => `<div class="hour"><b>${fmtTime(t)}</b><div class="symbol">${icon(data.hourly.weather_code[i])}</div><strong>${temp(data.hourly.temperature_2m[i])}</strong><span>${data.hourly.precipitation_probability[i] ?? 0}%</span></div>`).join('');
        $('days').innerHTML = data.daily.time.map((t, i) => `<div class="day"><b>${fmtDay(t)}</b><div class="symbol">${icon(data.daily.weather_code[i])}</div><div><div class="bar" style="opacity:${0.35 + (data.daily.precipitation_probability_max[i] || 0)/160}"></div><span>${label(data.daily.weather_code[i])}</span></div><strong>${temp(data.daily.temperature_2m_max[i])} / ${temp(data.daily.temperature_2m_min[i])}</strong></div>`).join('');
        $('rainline').innerHTML = data.hourly.precipitation_probability.slice(0, 12).map(v => `<i style="height:${Math.max(4, v * .7)}px; opacity:${0.28 + v/130}"></i>`).join('');
        $('status').textContent = `${label(c.weather_code)} / 降水確率 ${data.hourly.precipitation_probability[0] || 0}%`;
      }
      function tick() {
        const left = Math.max(0, state.next - Date.now());
        const m = String(Math.floor(left / 60000)).padStart(2, '0');
        const s = String(Math.floor(left % 60000 / 1000)).padStart(2, '0');
        $('countdown').textContent = `次の更新 ${m}:${s}`;
      }
      function demo() {
        const now = Date.now();
        const hours = Array.from({length:24}, (_,i) => new Date(now + i*3600000).toISOString());
        const days = Array.from({length:7}, (_,i) => new Date(now + i*86400000).toISOString());
        return { current:{ temperature_2m:24, relative_humidity_2m:62, apparent_temperature:25, is_day:1, precipitation:0, weather_code:1, cloud_cover:28, pressure_msl:1012, wind_speed_10m:12 }, hourly:{ time:hours, temperature_2m:hours.map((_,i)=>24+Math.sin(i/3)*3), apparent_temperature:hours.map(()=>25), precipitation_probability:hours.map((_,i)=>Math.round(Math.max(0, Math.sin(i/2))*38)), precipitation:hours.map(()=>0), weather_code:hours.map((_,i)=>i>14?2:1), cloud_cover:hours.map(()=>30), wind_speed_10m:hours.map(()=>12), uv_index:hours.map((_,i)=>Math.max(0, 7-Math.abs(12-i))), is_day:hours.map(()=>1) }, daily:{ time:days, weather_code:[1,2,3,61,1,2,0], temperature_2m_max:[27,26,24,22,27,28,29], temperature_2m_min:[19,20,19,18,20,21,21], precipitation_probability_max:[8,18,35,78,12,22,6], uv_index_max:[7,6,4,2,7,8,8] } };
      }
      $('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const q = $('query').value.trim();
        if (!q) return;
        const results = await findCity(q);
        if (results[0]) { state.place = [results[0].name, results[0].latitude, results[0].longitude, results[0].country]; $('suggestions').style.display = 'none'; load(); }
      });
      let suggestTimer;
      $('query').addEventListener('input', () => {
        clearTimeout(suggestTimer);
        const q = $('query').value.trim();
        if (q.length < 2) { $('suggestions').style.display = 'none'; return; }
        suggestTimer = setTimeout(async () => {
          try {
            const results = await findCity(q);
            $('suggestions').innerHTML = results.map((r, i) => `<button type="button" data-i="${i}">${r.name}<br><small>${r.admin1 || ''} ${r.country || ''}</small></button>`).join('');
            $('suggestions').style.display = results.length ? 'block' : 'none';
            $('suggestions').querySelectorAll('button').forEach((btn, i) => btn.onclick = () => { const r = results[i]; state.place = [r.name, r.latitude, r.longitude, r.country]; $('query').value=''; $('suggestions').style.display='none'; load(); });
          } catch {}
        }, 280);
      });
      $('geo').addEventListener('click', () => navigator.geolocation?.getCurrentPosition(pos => { state.place = ['Current', pos.coords.latitude, pos.coords.longitude, '']; load(); }, () => $('status').textContent = '現在地を取得できません'));
      $('unit').addEventListener('click', () => { state.unit = state.unit === 'c' ? 'f' : 'c'; $('unit').textContent = state.unit === 'c' ? '°C' : '°F'; if (state.data) render(state.data, null); });
      if ('serviceWorker' in navigator && location.protocol.startsWith('http')) navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      renderQuick();
      load();
    </script>
  </body>
</html>
